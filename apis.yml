aid: cplusplus
name: C++
kind: opensource
description: >-
  C++ is a general-purpose, statically typed, compiled programming language
  created by Bjarne Stroustrup as an extension of C. C++ supports object-
  oriented, generic, and functional programming and is widely used in systems
  programming, game engines, embedded systems, scientific computing, finance,
  and high-performance services. The language is standardized by ISO/IEC JTC1/SC22/WG21
  with current revisions including C++20 and C++23. C++ does not expose a
  network/HTTP API; this index captures the language home, standards process,
  reference documentation, and ecosystem resources.
